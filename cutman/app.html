<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0A">
<title>Cutman</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0A0A0A; font-family: 'Inter', -apple-system, sans-serif; }
  #app { width: 100%; height: 100dvh; height: 100vh; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }
  .hscroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .hscroll::-webkit-scrollbar { display: none; }
  input, button { font-family: inherit; }
  input:focus { outline: none; }
  @keyframes cmFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  [style*="cursor:pointer"]:active { opacity: 0.62 !important; transition: opacity 0.05s !important; }
</style>
</head>
<body>
<div id="app"></div>
<script src="cutman-design-system.js"></script>
<script>
(function () {
  'use strict';
  var T = CM.T, S = CM.S, R = CM.R, c = CM.c;

  /* ─── API ──────────────────────────────────────────────────── */
  var API = 'https://cutman-hyf5.onrender.com';

  /* ─── SAFE AREA ─────────────────────────────────────────────── */
  var safeTop    = 'env(safe-area-inset-top, 12px)';
  var safeBottom = 'env(safe-area-inset-bottom, 0px)';

  /* ─── NAV HEIGHT ────────────────────────────────────────────── */
  var NAV_H = 64; // px, plus safeBottom

  /* ─── DATA LOADERS ──────────────────────────────────────────── */
  function loadEvents() {
    if (cmState._eventsLoaded || cmState._eventsLoading) return;
    cmState._eventsLoading = true;
    fetch(API + '/api/events')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        cmState.eventsData = Array.isArray(data) ? data : [];
        cmState._eventsLoaded = true;
        cmState._eventsLoading = false;
        if (cmState.cur === 'home' || cmState.cur === 'cards') cmRender();
      })
      .catch(function () {
        cmState.eventsData = [];
        cmState._eventsLoaded = true;
        cmState._eventsLoading = false;
        if (cmState.cur === 'home' || cmState.cur === 'cards') cmRender();
      });
  }

  function loadNews() {
    if (cmState._newsLoaded || cmState._newsLoading) return;
    cmState._newsLoading = true;
    fetch(API + '/api/news')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        cmState.newsData = Array.isArray(data) ? data : [];
        cmState._newsLoaded = true;
        cmState._newsLoading = false;
        if (cmState.cur === 'home' || cmState.cur === 'news') cmRender();
      })
      .catch(function () {
        cmState.newsData = [];
        cmState._newsLoaded = true;
        cmState._newsLoading = false;
        if (cmState.cur === 'home' || cmState.cur === 'news') cmRender();
      });
  }

  var _searchTimer;
  window.cmSearch = function (val) {
    cmState.searchQuery = val;
    clearTimeout(_searchTimer);
    if (!val.trim()) {
      cmState.searchResults = null;
      cmState.searchLoading = false;
      cmRender();
      return;
    }
    _searchTimer = setTimeout(function () {
      cmState.searchLoading = true;
      cmRender();
      fetch(API + '/api/fighters/search?q=' + encodeURIComponent(val.trim()))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          cmState.searchResults = Array.isArray(data) ? data : [];
          cmState.searchLoading = false;
          cmRender();
        })
        .catch(function () {
          cmState.searchResults = [];
          cmState.searchLoading = false;
          cmRender();
        });
    }, 380);
  };

  window.cmLoadFighter = function (slug) {
    cmState.fighterSlug = slug;
    cmState.fighterProfile = null;
    cmState.fighterLoading = true;
    cmState.fighterTab = 'record';
    cmGo('fighter');
    fetch(API + '/api/fighters/' + encodeURIComponent(slug))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (cmState.fighterSlug === slug) {
          cmState.fighterProfile = data;
          cmState.fighterLoading = false;
          if (cmState.cur === 'fighter') cmRender();
        }
      })
      .catch(function () {
        if (cmState.fighterSlug === slug) {
          cmState.fighterLoading = false;
          if (cmState.cur === 'fighter') cmRender();
        }
      });
  };

  /* ─── SHARED COMPONENTS ─────────────────────────────────────── */

  function header(th, title, rightHTML) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;' +
      'padding-top:' + safeTop + ';padding-left:' + S.xl + ';padding-right:' + S.xl + ';' +
      'padding-bottom:10px;flex-shrink:0;background:' + th.bg + '">' +
      '<div style="font-size:22px;font-weight:900;color:' + th.text + ';letter-spacing:-0.03em">' + title + '</div>' +
      (rightHTML || '') +
    '</div>';
  }

  function themeToggle(th) {
    var icon = cmState.dark
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    return '<div onclick="cmToggleTheme()" style="cursor:pointer;color:' + th.muted + ';' +
      'width:32px;height:32px;border-radius:50%;border:1px solid ' + th.border + ';' +
      'display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0">' +
      icon + '</div>';
  }

  function skeleton(th, w, h, radius) {
    return '<div style="width:' + (w||'100%') + ';height:' + (h||'16px') + ';' +
      'background:' + th.card2 + ';border-radius:' + (radius||R.sm) + ';flex-shrink:0"></div>';
  }

  function spinner(th) {
    var slowHint = cmState._slowLoad
      ? '<div style="margin-top:16px;font-size:11px;color:' + th.muted + ';text-align:center;line-height:1.6">Server is waking up…<br>This may take ~30s on first load</div>'
      : '';
    return '<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px;flex:1">' +
      '<div style="width:28px;height:28px;border-radius:50%;' +
        'border:2.5px solid ' + th.border + ';border-top-color:' + th.primary + ';' +
        'animation:spin 0.7s linear infinite"></div>' +
      slowHint +
    '</div>';
  }

  function promoColor(promo) {
    var map = { UFC: '#E8272A', BOXING: '#818CF8', PFL: '#4ADE80', ONE: '#D4A853', BELLATOR: '#C084FC', BKFC: '#F97316' };
    return map[(promo||'').toUpperCase()] || '#9A9A9A';
  }

  function promoFromEvent(ev) {
    return (ev.promotion || ev.promo || '').toUpperCase().split(/\s/)[0];
  }

  /* ─── EVENT HELPERS ──────────────────────────────────────────── */

  function renderEventHero(th, ev) {
    var promo = promoFromEvent(ev);
    var col = promoColor(promo);
    var mainFight = ev.main_event || ev.mainEvent || '';
    var name = ev.name || '';
    var date = ev.date || '';
    var venue = ev.venue || '';
    var net = ev.network || '';

    return '<div onclick="cmGo(\'fightCard\')" style="margin:0 ' + S.xl + ' ' + S.section + ';border-radius:' + R.xl + ';' +
      'background:linear-gradient(145deg,' + col + '22 0%,rgba(0,0,0,0.88) 100%);' +
      'border:1px solid ' + col + '44;box-shadow:0 8px 32px ' + col + '22;' +
      'position:relative;height:190px;overflow:hidden;cursor:pointer">' +

      '<div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;' +
        'background:' + col + '28;filter:blur(36px);pointer-events:none"></div>' +

      '<div style="position:absolute;inset:0;padding:18px;display:flex;flex-direction:column;justify-content:space-between">' +

        '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
          c.promoBadge(promo || (ev.promotion || '').substring(0, 10)) +
          '<div style="font-size:10px;color:rgba(255,255,255,0.55);font-weight:600">' + date + '</div>' +
        '</div>' +

        '<div>' +
          (name ? '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:5px">' + name + '</div>' : '') +
          (mainFight
            ? '<div style="font-size:24px;font-weight:900;color:#FFF;line-height:1.1;letter-spacing:-0.02em;margin-bottom:8px">' + mainFight + '</div>'
            : '<div style="font-size:20px;font-weight:900;color:#FFF;line-height:1.1;margin-bottom:8px">' + name + '</div>') +
          '<div style="display:flex;align-items:center;justify-content:space-between">' +
            (venue ? '<div style="display:flex;align-items:center;gap:4px">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
              '<span style="font-size:10px;color:rgba(255,255,255,0.5)">' + venue + '</span>' +
            '</div>' : '<div></div>') +
            (net ? '<span style="font-size:11px;color:rgba(255,255,255,0.85);font-weight:700">' + net + '</span>' : '') +
          '</div>' +
        '</div>' +

      '</div>' +
    '</div>';
  }

  function renderEventHeroSkeleton(th) {
    return '<div style="margin:0 ' + S.xl + ' ' + S.section + ';border-radius:' + R.xl + ';' +
      'background:' + th.card + ';height:190px;overflow:hidden;padding:18px;' +
      'display:flex;flex-direction:column;justify-content:space-between">' +
      '<div style="display:flex;gap:8px">' + skeleton(th,'60px','18px',R.sm) + '</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px">' +
        skeleton(th,'80px','10px',R.sm) +
        skeleton(th,'70%','28px',R.md) +
        skeleton(th,'50%','10px',R.sm) +
      '</div>' +
    '</div>';
  }

  function renderEventCard(th, ev) {
    var promo = promoFromEvent(ev);
    var col = promoColor(promo);
    var name = ev.name || ev.promotion || '';
    var mainFight = ev.main_event || ev.mainEvent || '';
    var date = (ev.date || '').replace(/\d{4}/, '').trim().replace(/,\s*$/, '');
    var net = ev.network || '';

    return '<div onclick="cmSetState(\'selectedEvent\',' + JSON.stringify(JSON.stringify(ev)) + ');cmGo(\'fightCard\')" ' +
      'style="flex-shrink:0;width:160px;cursor:pointer">' +
      '<div style="height:118px;border-radius:' + R.lg + ';background:linear-gradient(135deg,' + col + '22 0%,' + th.card + ' 100%);' +
        'border:1px solid ' + th.border + ';margin-bottom:8px;position:relative;overflow:hidden;' +
        'box-shadow:0 4px 16px rgba(0,0,0,0.3)">' +
        '<div style="position:absolute;top:0;left:0;right:0;bottom:0;background:' + col + '14"></div>' +
        '<div style="position:absolute;top:8px;left:8px">' + c.promoBadge(promo || name.substring(0,10)) + '</div>' +
        '<div style="position:absolute;top:8px;right:8px;font-size:9px;color:rgba(255,255,255,0.55);font-weight:600">' + date + '</div>' +
        '<div style="position:absolute;bottom:8px;left:8px;right:8px">' +
          '<div style="font-size:12px;font-weight:800;color:#FFF;line-height:1.2">' + name + '</div>' +
          (net ? '<div style="font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px">' + net + '</div>' : '') +
        '</div>' +
      '</div>' +
      (mainFight ? '<div style="font-size:11px;font-weight:600;color:' + th.sub + ';line-height:1.35">' + mainFight + '</div>' : '') +
    '</div>';
  }

  function renderNewsItem(th, item, i) {
    var source = item.source || item.feed || '';
    var time   = item.age || item.time || '';
    var title  = item.title || item.headline || '';
    var url    = item.url || item.link || '';
    var hot    = item.hot || i === 0;
    return '<div ' + (url ? 'onclick="window.open(\'' + escAttr(url) + '\',\'_blank\')"' : '') +
      ' style="display:flex;gap:10px;padding:11px 0;border-bottom:1px solid ' + th.border + ';cursor:pointer">' +
      '<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0;width:70px">' +
        (hot ? '<span style="font-size:8px;font-weight:700;color:' + th.primary + ';letter-spacing:0.06em">🔥 HOT</span>' : '') +
        '<span style="font-size:9px;font-weight:700;color:' + th.muted + '">' + source + '</span>' +
        (time ? '<span style="font-size:9px;color:' + th.muted + '">' + time + '</span>' : '') +
      '</div>' +
      '<div style="flex:1;font-size:12px;font-weight:' + (i < 2 ? '600' : '500') + ';color:' +
        (i < 2 ? th.text : th.sub) + ';line-height:1.45;' + (i >= 3 ? 'opacity:0.7' : '') + '">' + title + '</div>' +
    '</div>';
  }

  /* ─── SCREENS ────────────────────────────────────────────────── */

  function sHome(th) {
    loadEvents();
    loadNews();

    var filter  = cmState.homeFilter || 'All';
    var chips   = ['All', 'UFC', 'Boxing', 'PFL', 'ONE', 'Bellator', 'BKFC'];
    var events  = cmState.eventsData;
    var news    = cmState.newsData;
    var loading = !cmState._eventsLoaded || !cmState._newsLoaded;

    var BOXING_PROMOS = ['GB','GBP','TR','MB','MR','QB','QBP','DBE','PBC','GOLDEN BOY',
      'TOP RANK','MATCHROOM','QUEENSBERRY','PREMIER BOXING','DIBELLA','PROBELLUM','DAZN','BOXING'];
    var filtered = events ? events.filter(function (ev) {
      if (filter === 'All') return true;
      var p = promoFromEvent(ev);
      if (filter === 'Boxing') return BOXING_PROMOS.indexOf(p) >= 0;
      return p === filter.toUpperCase() || p.indexOf(filter.toUpperCase()) >= 0;
    }) : null;

    var nextEv = filtered && filtered.length ? filtered[0] : null;

    return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +
      header(th, 'CUTMAN <span style="color:' + th.primary + '">🥊</span>', themeToggle(th)) +

      '<div class="scroll" style="flex:1;padding-bottom:calc(' + NAV_H + 'px + ' + safeBottom + ')">' +

        /* Hero */
        (nextEv
          ? renderEventHero(th, nextEv)
          : loading
            ? renderEventHeroSkeleton(th)
            : '<div style="margin:0 ' + S.xl + ' ' + S.section + ';border-radius:' + R.xl + ';background:' + th.card + ';height:190px;display:flex;align-items:center;justify-content:center;color:' + th.muted + ';font-size:13px">No upcoming events</div>') +

        /* Filter chips */
        '<div class="hscroll" style="display:flex;gap:7px;padding:0 ' + S.xl + ';margin-bottom:' + S.section + '">' +
          chips.map(function (ch) { return c.chip(th, ch, ch === filter, 'cmSetState(\'homeFilter\',\'' + ch + '\')'); }).join('') +
        '</div>' +

        /* This Week */
        c.sectionHeader(th, 'This Week', 'See all', 'cmGo(\'cards\')') +
        (filtered && filtered.length
          ? '<div class="hscroll" style="display:flex;gap:10px;padding:0 ' + S.xl + ';margin-bottom:' + S.section + '">' +
              filtered.slice(0, 8).map(function (ev) { return renderEventCard(th, ev); }).join('') +
            '</div>'
          : loading
            ? '<div style="display:flex;gap:10px;padding:0 ' + S.xl + ';margin-bottom:' + S.section + ';overflow:hidden">' +
                [1,2,3].map(function() { return '<div style="flex-shrink:0;width:160px;height:118px;background:' + th.card + ';border-radius:' + R.lg + '"></div>'; }).join('') +
              '</div>'
            : '<div style="padding:0 ' + S.xl + ' ' + S.section + ';color:' + th.muted + ';font-size:12px">No events found</div>') +

        /* Latest News */
        c.sectionHeader(th, 'Latest News', 'See all', 'cmGo(\'news\')') +
        (news && news.length
          ? '<div style="padding:0 ' + S.xl + '">' +
              news.slice(0, 5).map(function (item, i) { return renderNewsItem(th, item, i); }).join('') +
            '</div>'
          : loading
            ? '<div style="padding:0 ' + S.xl + ';display:flex;flex-direction:column;gap:14px">' +
                [1,2,3].map(function() {
                  return '<div style="display:flex;gap:10px">' +
                    skeleton(th,'70px','36px',R.sm) +
                    '<div style="flex:1;display:flex;flex-direction:column;gap:6px">' +
                      skeleton(th,'100%','12px',R.sm) +
                      skeleton(th,'80%','12px',R.sm) +
                    '</div>' +
                  '</div>';
                }).join('') +
              '</div>'
            : '<div style="padding:0 ' + S.xl + ';color:' + th.muted + ';font-size:12px">No news available</div>') +

        '<div style="height:24px"></div>' +
      '</div>' +

      c.navBar(th, 0) +
    '</div>';
  }

  function sCards(th) {
    loadEvents();
    var events  = cmState.eventsData;
    var loading = !cmState._eventsLoaded;

    return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +
      header(th, 'Fight Cards') +

      '<div class="scroll" style="flex:1;padding-bottom:calc(' + NAV_H + 'px + ' + safeBottom + ')">' +

        (loading
          ? spinner(th)
          : events && events.length
            ? events.map(function (ev) {
                var promo = promoFromEvent(ev);
                var col = promoColor(promo);
                var mainFight = ev.main_event || ev.mainEvent || '';
                return '<div onclick="cmSetState(\'selectedEvent\',' + JSON.stringify(JSON.stringify(ev)) + ');cmGo(\'fightCard\')" ' +
                  'style="padding:14px ' + S.xl + ';border-bottom:1px solid ' + th.border + ';cursor:pointer;display:flex;align-items:center;gap:14px">' +
                  '<div style="width:44px;height:44px;border-radius:' + R.md + ';background:' + col + '22;border:1.5px solid ' + col + '55;' +
                    'display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
                    '<span style="font-size:8px;font-weight:800;color:' + col + ';letter-spacing:0.03em">' + (promo || '?') + '</span>' +
                  '</div>' +
                  '<div style="flex:1;min-width:0">' +
                    '<div style="font-size:14px;font-weight:800;color:' + th.text + ';line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (ev.name || ev.promotion || '') + '</div>' +
                    (mainFight ? '<div style="font-size:11px;color:' + th.sub + ';margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + mainFight + '</div>' : '') +
                    '<div style="font-size:10px;color:' + th.muted + ';margin-top:3px">' + (ev.date||'') + (ev.venue ? ' · ' + ev.venue : '') + '</div>' +
                  '</div>' +
                  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>' +
                '</div>';
              }).join('')
            : '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px;text-align:center">' +
                '<div style="font-size:48px;margin-bottom:16px">📅</div>' +
                '<div style="font-size:16px;font-weight:700;color:' + th.text + ';margin-bottom:8px">No Events Found</div>' +
                '<div style="font-size:13px;color:' + th.muted + '">Check back soon for upcoming fights</div>' +
              '</div>') +

      '</div>' +
      c.navBar(th, 1) +
    '</div>';
  }

  /* Static UFC 315 fight card data (fallback) */
  var STATIC_CARD = {
    promo: 'UFC', name: 'UFC 315',
    date: 'Saturday, May 31, 2026', time: 'Main Card 10pm ET · Prelims 8pm ET',
    venue: 'Madison Square Garden', city: 'New York, NY',
    network: 'ESPN+', ppvPrice: '$79.99',
    main_card: [
      { a:'Jon Jones', aRank:'Champion', aOdds:-350, b:'Stipe Miocic', bRank:'#1 Contender', bOdds:+280, weightClass:'Heavyweight', rounds:5, title:true, main:true },
      { a:'Leon Edwards', aRank:'Champion', aOdds:-280, b:'Shavkat Rakhimov', bRank:'#3', bOdds:+225, weightClass:'Welterweight', rounds:5, title:true },
      { a:'Alex Pereira', aRank:'#1', aOdds:-400, b:'Khalil Rountree Jr.', bRank:'#4', bOdds:+310, weightClass:'Light Heavyweight', rounds:3 },
      { a:'Sean Strickland', aRank:'#2', aOdds:-150, b:'Paulo Costa', bRank:'#5', bOdds:+125, weightClass:'Middleweight', rounds:3 }
    ],
    prelims: [
      { a:'Brian Ortega', aRank:'#3', aOdds:+135, b:'Yair Rodriguez', bRank:'#2', bOdds:-165, weightClass:'Featherweight', rounds:3 },
      { a:'Mateusz Gamrot', aRank:'#6', aOdds:+165, b:'Arman Tsarukyan', bRank:'#4', bOdds:-200, weightClass:'Lightweight', rounds:3 }
    ]
  };

  /* Helper: parse "Fighter A vs. Fighter B" → ['Fighter A', 'Fighter B'] */
  function parseVs(str) {
    if (!str) return [];
    var parts = str.split(/\s+vs\.?\s+/i);

    return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +

                (p.url ? '<div style="margin-top:20px"><a href="' + escHtml(p.url) + '" target="_blank" ' +
                  'style="font-size:12px;color:' + th.muted + ';text-decoration:none">View on Sherdog →</a></div>' : '') +
              '</div>') +

        '<div style="height:16px"></div>' +
      '</div>' +

      c.navBar(th, 2) +
    '</div>';

    return '<div style="margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:5px">' +
        '<span style="font-size:12px;font-weight:600;color:' + th.sub + '">' + label + '</span>' +
        '<span style="font-size:12px;font-weight:700;color:' + th.text + '">' + val + ' <span style="font-weight:400;color:' + th.muted + ';font-size:10px">(' + pct + '%)</span></span>' +
      '</div>' +
      '<div style="height:6px;background:' + th.card2 + ';border-radius:' + R.pill + ';overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:' + R.pill + ';transition:width 0.4s ease"></div>' +
      '</div>' +
    '</div>';
  }

  function bioRow(th, label, val) {
    if (!val) return '';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid ' + th.border + '">' +
      '<span style="font-size:13px;color:' + th.muted + '">' + label + '</span>' +
      '<span style="font-size:13px;font-weight:600;color:' + th.text + '">' + escHtml(String(val)) + '</span>' +
    '</div>';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/'/g,"\\'");
  }
  function tryParse(s) {
    try { return JSON.parse(s); } catch(e) { return null; }
  }
  function getInitials(name) {
    var parts = (name || '').trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return parts[0] ? parts[0][0].toUpperCase() : '?';
  }

  /* ─── WIRE UP ────────────────────────────────────────────────── */
  CM.nav(
    { home: sHome, cards: sCards, fightCard: sFightCard, fighters: sFighters, fighter: sFighter, news: sNews, me: sMe },
    'home',
    'app',
    { state: { homeFilter: 'All', searchQuery: '', fighterTab: 'record' } }
  );

  /* Screen fade transition */
  var _origRender = window.cmRender;
  window.cmRender = function() {
    _origRender.apply(this, arguments);
    var el = document.querySelector('#app > div');
    if (el) { el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'cmFadeIn 0.16s ease'; }
  };

  /* Cold-start slow-load hint after 6s */
  setTimeout(function() {
    if (cmState._eventsLoading || cmState._newsLoading) {
      cmState._slowLoad = true;
      window.cmRender();
    }
  }, 6000);

  /* ─── CSS ANIMATION ──────────────────────────────────────────── */
  var style = document.createElement('style');
  style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(style);

  /* ─── SEARCH INPUT FOCUS FIX ─────────────────────────────────── */
  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'fighter-search') {
      setTimeout(function() { e.target.focus(); }, 50);
    }
  });

})();
</script>
</body>
</html>

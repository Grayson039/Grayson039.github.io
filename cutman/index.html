<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0A">
<title>Cutman</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0A0A0A; font-family: 'Inter', -apple-system, sans-serif; }
  #app { width: 100%; height: 100dvh; height: 100vh; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }
  .hscroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .hscroll::-webkit-scrollbar { display: none; }
  input, button { font-family: inherit; }
  input:focus { outline: none; }
  @keyframes cmSkeletonPulse { 0%, 100% { background-color: #1A1A1A; } 50% { background-color: #2A2A2A; } }
  .cm-skel { animation: cmSkeletonPulse 1.3s ease-in-out infinite; }
</style>
</head>
<body>
<div id="app"></div>
<script src="cutman-design-system.js"></script>
<script>
(function () {
  'use strict';
  var T = CM.T, S = CM.S, R = CM.R, c = CM.c;

  /* ŌöĆŌöĆŌöĆ API ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  var API = 'https://cutman-hyf5.onrender.com';

  /* ŌöĆŌöĆŌöĆ SAFE AREA ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  var safeTop    = 'env(safe-area-inset-top, 12px)';
  var safeBottom = 'env(safe-area-inset-bottom, 0px)';

  /* ŌöĆŌöĆŌöĆ NAV HEIGHT ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  var NAV_H = 64; // px, plus safeBottom

  /* ŌöĆŌöĆŌöĆ DATA LOADERS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  function loadEvents() {
    if (cmState._eventsLoaded || cmState._eventsLoading) return;
    cmState._eventsLoading = true;
    cmState._eventsError = false;
    fetch(API + '/api/events')
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        cmState.eventsData = Array.isArray(data) ? data : [];
        cmState._eventsLoaded = true;
        cmState._eventsLoading = false;
        if (cmState.cur === 'home' || cmState.cur === 'cards') cmRender();
      })
      .catch(function () {
        cmState.eventsData = [];
        cmState._eventsLoaded = true;
        cmState._eventsLoading = false;
        cmState._eventsError = true;
        if (cmState.cur === 'home' || cmState.cur === 'cards') cmRender();
      });
  }

  function loadNews() {
    if (cmState._newsLoaded || cmState._newsLoading) return;
    cmState._newsLoading = true;
    cmState._newsError = false;
    fetch(API + '/api/news')
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        cmState.newsData = Array.isArray(data) ? data : [];
        cmState._newsLoaded = true;
        cmState._newsLoading = false;
        if (cmState.cur === 'home' || cmState.cur === 'news') cmRender();
      })
      .catch(function () {
        cmState.newsData = [];
        cmState._newsLoaded = true;
        cmState._newsLoading = false;
        cmState._newsError = true;
        if (cmState.cur === 'home' || cmState.cur === 'news') cmRender();
      });
  }

  function loadEventCard(ev) {
    var key = ev && ev.wiki_url;
    if (!key) {
      cmState.eventCardBouts = null;
      cmState._eventCardKey = '';
      cmState._eventCardLoaded = true;
      cmState._eventCardLoading = false;
      return;
    }
    if (cmState._eventCardKey === key && (cmState._eventCardLoaded || cmState._eventCardLoading)) return;
    cmState._eventCardKey = key;
    cmState._eventCardLoaded = false;
    cmState._eventCardLoading = true;
    fetch(API + '/api/events/card?wiki_url=' + encodeURIComponent(key))
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        if (cmState._eventCardKey !== key) return;
        cmState.eventCardBouts = Array.isArray(data.bouts) ? data.bouts : [];
        cmState._eventCardLoaded = true;
        cmState._eventCardLoading = false;
        if (cmState.cur === 'fightCard') cmRender();
      })
      .catch(function () {
        if (cmState._eventCardKey !== key) return;
        cmState.eventCardBouts = [];
        cmState._eventCardLoaded = true;
        cmState._eventCardLoading = false;
        if (cmState.cur === 'fightCard') cmRender();
      });
  }

  var _searchTimer;
  window.cmSearch = function (val) {
    cmState.searchQuery = val;
    clearTimeout(_searchTimer);
    if (!val.trim()) {
      cmState.searchResults = null;
      cmState.searchLoading = false;
      cmState.searchError = false;
      cmRender();
      return;
    }
    _searchTimer = setTimeout(function () {
      cmState.searchLoading = true;
      cmState.searchError = false;
      cmRender();
      fetch(API + '/api/fighters/search?q=' + encodeURIComponent(val.trim()))
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function (data) {
          cmState.searchResults = Array.isArray(data) ? data : [];
          cmState.searchLoading = false;
          cmRender();
        })
        .catch(function () {
          cmState.searchResults = [];
          cmState.searchLoading = false;
          cmState.searchError = true;
          cmRender();
        });
    }, 380);
  };

  window.cmLoadFighter = function (slug) {
    cmState.fighterSlug = slug;
    cmState.fighterProfile = null;
    cmState.fighterLoading = true;
    cmState.fighterTab = 'record';
    cmGo('fighter');
    fetch(API + '/api/fighters/' + encodeURIComponent(slug))
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        if (cmState.fighterSlug === slug) {
          cmState.fighterProfile = data;
          cmState.fighterLoading = false;
          if (cmState.cur === 'fighter') cmRender();
        }
      })
      .catch(function () {
        if (cmState.fighterSlug === slug) {
          cmState.fighterLoading = false;
          if (cmState.cur === 'fighter') cmRender();
        }
      });
  };

  /* ŌöĆŌöĆŌöĆ SHARED COMPONENTS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */

  function header(th, title, rightHTML) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;' +
      'padding-top:' + safeTop + ';padding-left:' + S.xl + ';padding-right:' + S.xl + ';' +
      'padding-bottom:10px;flex-shrink:0;background:' + th.bg + '">' +
      '<div style="font-size:22px;font-weight:900;color:' + th.text + ';letter-spacing:-0.03em">' + title + '</div>' +
      (rightHTML || '') +
    '</div>';
  }

  function themeToggle(th) {
    return '<div onclick="cmToggleTheme()" style="cursor:pointer;color:' + th.muted + ';font-size:12px;' +
      'padding:6px 12px;border-radius:' + R.pill + ';border:1px solid ' + th.border + ';user-select:none">' +
      (cmState.dark ? 'ŌśĆ' : 'ŌśŠ') + '</div>';
  }

  function skeleton(th, w, h, radius) {
    return '<div class="cm-skel" style="width:' + (w||'100%') + ';height:' + (h||'16px') + ';' +
      'border-radius:' + (radius||R.sm) + ';flex-shrink:0"></div>';
  }

  function spinner(th) {
    return '<div style="display:flex;justify-content:center;align-items:center;padding:48px;flex:1">' +
      '<div style="width:28px;height:28px;border-radius:50%;' +
        'border:2.5px solid ' + th.border + ';border-top-color:' + th.primary + ';' +
        'animation:spin 0.7s linear infinite"></div>' +
    '</div>';
  }

  function renderErrorState(th, title, retryOnclick) {
    return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 32px;text-align:center">' +
      '<div style="font-size:48px;margin-bottom:16px">ŌÜĀ’ĖÅ</div>' +
      '<div style="font-size:15px;font-weight:700;color:' + th.text + ';margin-bottom:6px">' + title + '</div>' +
      '<div style="font-size:13px;color:' + th.muted + ';margin-bottom:20px">Check your connection and try again</div>' +
      '<div onclick="' + retryOnclick + '" style="background:' + th.primary + ';color:#FFF;font-size:13px;font-weight:700;padding:10px 22px;border-radius:' + R.pill + ';cursor:pointer">Retry</div>' +
    '</div>';
  }

  function renderEventHeroError(th) {
    return '<div style="margin:0 ' + S.xl + ' ' + S.section + ';border-radius:' + R.xl + ';' +
      'background:' + th.card + ';border:1px solid ' + th.border + ';height:190px;display:flex;flex-direction:column;align-items:center;' +
      'justify-content:center;text-align:center;gap:10px;padding:0 28px">' +
      '<div style="font-size:28px">ŌÜĀ’ĖÅ</div>' +
      '<div style="font-size:13px;font-weight:700;color:' + th.muted + '">Couldn\'t load events</div>' +
      '<div onclick="cmState._eventsLoaded=false;cmState._eventsError=false;cmRender()" ' +
        'style="font-size:12px;font-weight:700;color:' + th.primary + ';cursor:pointer;padding:6px 16px;border:1px solid ' + th.primary + '44;border-radius:' + R.pill + '">Retry</div>' +
    '</div>';
  }

  var BOXING_PROMOS = ['GB','GBP','TR','MB','MR','QB','QBP','DBE','PBC','GOLDEN BOY',
    'TOP RANK','MATCHROOM','QUEENSBERRY','PREMIER BOXING','DIBELLA','PROBELLUM','DAZN','BOXING'];

  function promoColor(promo) {
    var p = (promo || '').toUpperCase();
    if (BOXING_PROMOS.indexOf(p) >= 0) p = 'BOXING';
    var map = { UFC: '#D20A0A', PFL: '#00A651', ONE: '#C9A84C', BKFC: '#E87722', BOXING: '#9B59B6', BELLATOR: '#1A6FBF' };
    return map[p] || '#9A9A9A';
  }

  function promoFromEvent(ev) {
    return (ev.promotion || ev.promo || '').toUpperCase().split(/\s/)[0];
  }

  /* ŌöĆŌöĆŌöĆ EVENT HELPERS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */

  function renderEventHero(th, ev) {
    var promo = promoFromEvent(ev);
    var col = promoColor(promo);
    var mainFight = ev.main_event || ev.mainEvent || '';
    var name = ev.name || '';
    var date = ev.date || '';
    var venue = ev.venue || '';
    var net = ev.network || '';

    return '<div onclick="cmGo(\'fightCard\')" style="margin:0 ' + S.xl + ' ' + S.section + ';border-radius:' + R.xl + ';' +
      'background:radial-gradient(circle at 0% 100%,' + col + '4D 0%,rgba(10,10,10,0.94) 55%,#0A0A0A 100%);' +
      'border:1px solid ' + col + '44;box-shadow:0 8px 32px ' + col + '22;' +
      'position:relative;height:190px;overflow:hidden;cursor:pointer">' +

      '<div style="position:absolute;inset:0;padding:18px;display:flex;flex-direction:column;justify-content:space-between">' +

        '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
          c.promoBadge(promo || (ev.promotion || '').substring(0, 10), col) +
          '<div style="font-size:10px;color:rgba(255,255,255,0.55);font-weight:600">' + date + '</div>' +
        '</div>' +

        '<div>' +
          (name ? '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:5px">' + name + '</div>' : '') +
          (mainFight
            ? '<div style="font-size:24px;font-weight:900;color:#FFF;line-height:1.1;letter-spacing:-0.02em;margin-bottom:8px">' + mainFight + '</div>'
            : '<div style="font-size:20px;font-weight:900;color:#FFF;line-height:1.1;margin-bottom:8px">' + name + '</div>') +
          '<div style="display:flex;align-items:center;justify-content:space-between">' +
            (venue ? '<div style="display:flex;align-items:center;gap:4px">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
              '<span style="font-size:10px;color:rgba(255,255,255,0.5)">' + venue + '</span>' +
            '</div>' : '<div></div>') +
            (net ? '<span style="font-size:11px;color:rgba(255,255,255,0.85);font-weight:700">' + net + '</span>' : '') +
          '</div>' +
        '</div>' +

      '</div>' +
    '</div>';
  }

  function renderEventHeroSkeleton(th) {
    return '<div style="margin:0 ' + S.xl + ' ' + S.section + '">' +
      skeleton(th,'100%','190px',R.xl) +
    '</div>';
  }

  function renderEventHeroEmpty(th, filter) {
    var isAll = !filter || filter === 'All';
    var col = isAll ? th.primary : promoColor(filter);
    var emoji = filter === 'Boxing' ? '­¤źŖ' : '­¤Åå';
    var message = isAll
      ? 'No upcoming events ŌĆö check back soon.'
      : 'No ' + filter + ' events this week ŌĆö check back soon.';

    return '<div style="margin:0 ' + S.xl + ' ' + S.section + ';border-radius:' + R.xl + ';' +
      'background:radial-gradient(circle at 0% 100%,' + col + '33 0%,rgba(10,10,10,0.94) 55%,#0A0A0A 100%);' +
      'border:1px solid ' + col + '33;height:190px;display:flex;flex-direction:column;align-items:center;' +
      'justify-content:center;text-align:center;gap:10px;padding:0 28px">' +
      '<div style="font-size:32px">' + emoji + '</div>' +
      '<div style="font-size:13px;font-weight:700;color:' + col + ';line-height:1.5">' + message + '</div>' +
    '</div>';
  }

  function renderEventCardSkeleton(th) {
    return '<div style="flex-shrink:0;width:160px">' +
      skeleton(th,'160px','118px',R.lg) +
      '<div style="margin-top:8px">' + skeleton(th,'80%','13px',R.sm) + '</div>' +
    '</div>';
  }

  function renderNewsItemSkeleton(th) {
    return '<div style="display:flex;gap:10px;padding:11px 0;border-bottom:1px solid ' + th.border + '">' +
      skeleton(th,'70px','36px',R.sm) +
      '<div style="flex:1;display:flex;flex-direction:column;gap:6px;justify-content:center">' +
        skeleton(th,'100%','12px',R.sm) +
        skeleton(th,'70%','12px',R.sm) +
      '</div>' +
    '</div>';
  }

  function renderEventCard(th, ev) {
    var promo = promoFromEvent(ev);
    var col = promoColor(promo);
    var name = ev.name || ev.promotion || '';
    var mainFight = ev.main_event || ev.mainEvent || '';
    var date = (ev.date || '').replace(/\d{4}/, '').trim().replace(/,\s*$/, '');
    var net = ev.network || '';

    return '<div onclick="' + escHtml("cmSetState('selectedEvent'," + JSON.stringify(JSON.stringify(ev)) + ");cmGo('fightCard')") + '" ' +
      'style="flex-shrink:0;width:160px;cursor:pointer">' +
      '<div style="height:118px;border-radius:' + R.lg + ';background:radial-gradient(circle at 0% 100%,' + col + '55 0%,' + th.card + ' 65%);' +
        'border:1px solid ' + th.border + ';margin-bottom:8px;position:relative;overflow:hidden;' +
        'box-shadow:0 4px 16px rgba(0,0,0,0.3)">' +
        '<div style="position:absolute;top:8px;left:8px">' + c.promoBadge(promo || name.substring(0,10), col) + '</div>' +
        '<div style="position:absolute;top:8px;right:8px;font-size:9px;color:rgba(255,255,255,0.55);font-weight:600">' + date + '</div>' +
        '<div style="position:absolute;bottom:8px;left:8px;right:8px">' +
          (mainFight ? '<div style="font-size:8px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + name + '</div>' : '') +
          '<div style="font-size:12px;font-weight:800;color:#FFF;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,0.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (mainFight || name) + '</div>' +
          (net ? '<div style="font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px">' + net + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function renderNewsItem(th, item, i) {
    var source = item.source || item.feed || '';
    var time   = item.age || item.time || '';
    var title  = item.title || item.headline || '';
    var hot    = item.hot || i === 0;
    return '<div style="display:flex;gap:10px;padding:11px 0;border-bottom:1px solid ' + th.border + ';cursor:pointer">' +
      '<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0;width:70px">' +
        (hot ? '<span style="font-size:8px;font-weight:700;color:' + th.primary + ';letter-spacing:0.06em">­¤öź HOT</span>' : '') +
        '<span style="font-size:9px;font-weight:700;color:' + th.muted + '">' + source + '</span>' +
        (time ? '<span style="font-size:9px;color:' + th.muted + '">' + time + '</span>' : '') +
      '</div>' +
      '<div style="flex:1;font-size:12px;font-weight:' + (i < 2 ? '600' : '500') + ';color:' +
        (i < 2 ? th.text : th.sub) + ';line-height:1.45;' + (i >= 3 ? 'opacity:0.7' : '') + '">' + title + '</div>' +
    '</div>';
  }

  /* ŌöĆŌöĆŌöĆ SCREENS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */

  function sHome(th) {
    loadEvents();
    loadNews();

    var filter  = cmState.homeFilter || 'All';
    var chips   = ['All', 'UFC', 'Boxing', 'PFL', 'ONE', 'Bellator', 'BKFC'];

                      '<span style="font-size:16px;font-weight:800;color:' + th.primary + '">' + escHtml((f.name||'?').charAt(0).toUpperCase()) + '</span>' +
                    '</div>' +
                    '<div style="flex:1;min-width:0">' +
                      '<div style="font-size:14px;font-weight:700;color:' + th.text + '">' + escHtml(f.name) + '</div>' +
                      '<div style="font-size:11px;color:' + th.muted + ';margin-top:2px">' +
                        (f.nickname ? escHtml(f.nickname) + ' ┬Ę ' : '') +
                        (f.weight ? escHtml(f.weight) : '') +
                        (f.association ? ' ┬Ę ' + escHtml(f.association) : '') +
                      '</div>' +
                    '</div>' +
                    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>' +
                  '</div>';
                }).join('')) +

      '</div>' +
      c.navBar(th, 2) +
    '</div>';
  }

  function sFighter(th) {
    var p       = cmState.fighterProfile;
    var loading = cmState.fighterLoading;
    var tab     = cmState.fighterTab || 'record';

    if (loading) {
      return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +
        '<div style="padding-top:' + safeTop + ';padding-left:' + S.xl + ';padding-bottom:10px;flex-shrink:0">' + c.backBtn(th, 'Fighters') + '</div>' +
        spinner(th) +
        c.navBar(th, 2) +
      '</div>';
    }

    if (!p) {
      return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +
        '<div style="padding-top:' + safeTop + ';padding-left:' + S.xl + ';padding-bottom:10px;flex-shrink:0">' + c.backBtn(th, 'Fighters') + '</div>' +
        '<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px;text-align:center">' +
          '<div style="font-size:48px;margin-bottom:16px">ŌÜĀ’ĖÅ</div>' +
          '<div style="font-size:15px;font-weight:700;color:' + th.text + ';margin-bottom:6px">Could not load fighter</div>' +
          '<div style="font-size:13px;color:' + th.muted + ';margin-bottom:20px">Check your connection and try again</div>' +
          '<div onclick="cmLoadFighter(\'' + escAttr(cmState.fighterSlug || '') + '\')" ' +
            'style="background:' + th.primary + ';color:#FFF;font-size:13px;font-weight:700;padding:10px 22px;border-radius:' + R.pill + ';cursor:pointer">Retry</div>' +
        '</div>' +
        c.navBar(th, 2) +
      '</div>';
    }

    var wins   = p.wins   || 0;
    var losses = p.losses || 0;
    var draws  = p.draws  || 0;
    var record = wins + 'ŌĆō' + losses + (draws ? 'ŌĆō' + draws : '');
    var koRate = wins > 0 ? Math.round((p.wins_by_ko  || 0) / wins * 100) : 0;
    var subRate= wins > 0 ? Math.round((p.wins_by_sub || 0) / wins * 100) : 0;
    var decRate= wins > 0 ? Math.round((p.wins_by_dec || 0) / wins * 100) : 0;

    return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +

      /* Header */
      '<div style="background:linear-gradient(160deg,' + th.primary + '22 0%,' + th.bg + ' 70%);flex-shrink:0">' +
        '<div style="padding-top:' + safeTop + ';padding-left:' + S.xl + ';padding-right:' + S.xl + ';padding-bottom:0">' +
          c.backBtn(th, 'Fighters') +
        '</div>' +
        '<div style="padding:12px ' + S.xl + ' 16px;display:flex;gap:14px;align-items:flex-start">' +
          /* Photo */
          (p.photo
            ? '<img src="' + escHtml(p.photo) + '" alt="' + escHtml(p.name) + '" ' +
                'style="width:80px;height:80px;border-radius:' + R.lg + ';object-fit:cover;object-position:top;' +
                'border:2px solid ' + th.border + ';flex-shrink:0" ' +
                'onerror="this.style.display=\'none\'">'
            : '<div style="width:80px;height:80px;border-radius:' + R.lg + ';background:' + th.card2 + ';' +
                'display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:32px">­¤źŖ</div>') +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-size:24px;font-weight:900;color:' + th.text + ';letter-spacing:-0.02em;line-height:1.1">' + escHtml(p.name) + '</div>' +
            (p.nickname ? '<div style="font-size:12px;color:' + th.muted + ';margin-top:3px;font-style:italic">"' + escHtml(p.nickname) + '"</div>' : '') +
            '<div style="display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap">' +
              '<div>' +
                '<div style="font-size:22px;font-weight:900;color:' + th.text + '">' + record + '</div>' +
                '<div style="font-size:9px;color:' + th.muted + ';letter-spacing:0.08em">RECORD</div>' +
              '</div>' +
              '<div style="width:1px;height:32px;background:' + th.border + '"></div>' +
              (p.weight_class ? '<div style="font-size:11px;font-weight:700;color:' + th.sub + '">' + escHtml(p.weight_class) + '</div>' : '') +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      /* Tabs */
      '<div style="display:flex;border-bottom:1px solid ' + th.border + ';flex-shrink:0;background:' + th.bg + '">' +
        ['record','stats','bio'].map(function(t) {
          var active = tab === t;
          var label = t.charAt(0).toUpperCase() + t.slice(1);
          return '<div onclick="cmSetState(\'fighterTab\',\'' + t + '\')" style="flex:1;padding:12px 0;text-align:center;font-size:12px;font-weight:' + (active?'700':'500') + ';color:' + (active?th.text:th.muted) + ';cursor:pointer;border-bottom:2px solid ' + (active?th.primary:'transparent') + ';margin-bottom:-1px">' + label + '</div>';
        }).join('') +
      '</div>' +

      /* Tab content */
      '<div class="scroll" style="flex:1;padding-bottom:calc(' + NAV_H + 'px + ' + safeBottom + ')">' +

        (tab === 'record'
          ? (p.fight_history && p.fight_history.length
              ? p.fight_history.map(function (f) {
                  return c.resultRow(th, {
                    result:   f.result,
                    opponent: f.opponent,
                    method:   (f.method || '') + (f.round ? ' ┬Ę R' + f.round : '') + (f.time ? ' ' + f.time : ''),
                    event:    f.event || '',
                    date:     f.date || ''
                  });
                }).join('')
              : '<div style="padding:48px 32px;text-align:center;color:' + th.muted + ';font-size:13px">No fight history available</div>')

          : tab === 'stats'
            ? '<div style="padding:' + S.xl + '">' +

                /* Win method bars */
                '<div style="font-size:11px;font-weight:700;color:' + th.muted + ';letter-spacing:0.1em;margin-bottom:14px">WINS BY METHOD</div>' +
                statBar(th, 'KO / TKO', p.wins_by_ko || 0, wins, th.primary) +
                statBar(th, 'Submission', p.wins_by_sub || 0, wins, '#818CF8') +
                statBar(th, 'Decision', p.wins_by_dec || 0, wins, th.gold) +

                '<div style="margin-top:24px;font-size:11px;font-weight:700;color:' + th.muted + ';letter-spacing:0.1em;margin-bottom:14px">LOSSES BY METHOD</div>' +
                statBar(th, 'KO / TKO', p.losses_by_ko || 0, losses || 1, th.loss) +
                statBar(th, 'Submission', p.losses_by_sub || 0, losses || 1, '#F59E0B') +
                statBar(th, 'Decision', p.losses_by_dec || 0, losses || 1, th.muted) +

              '</div>'

            /* Bio */
            : '<div style="padding:' + S.xl + '">' +
                bioRow(th, 'Age', p.age) +
                bioRow(th, 'Date of Birth', p.dob) +
                bioRow(th, 'Height', p.height) +
                bioRow(th, 'Weight', p.weight) +
                bioRow(th, 'Weight Class', p.weight_class) +
                bioRow(th, 'Association', p.association) +
                bioRow(th, 'Nationality', p.nationality) +
                (p.url ? '<div style="margin-top:20px"><a href="' + escHtml(p.url) + '" target="_blank" ' +
                  'style="font-size:12px;color:' + th.muted + ';text-decoration:none">View on Sherdog ŌåÆ</a></div>' : '') +
              '</div>') +

        '<div style="height:16px"></div>' +
      '</div>' +

      c.navBar(th, 2) +
    '</div>';
  }

  function sNews(th) {
    loadNews();
    var news    = cmState.newsData;
    var loading = !cmState._newsLoaded;

    return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +
      header(th, 'News') +

      '<div class="scroll" style="flex:1;padding:0 ' + S.xl + ';padding-bottom:calc(' + NAV_H + 'px + ' + safeBottom + ')">' +

        (loading
          ? spinner(th)
          : news && news.length
            ? news.map(function (item, i) { return renderNewsItem(th, item, i); }).join('')
            : cmState._newsError
              ? renderErrorState(th, "Couldn't load news", "cmState._newsLoaded=false;cmState._newsError=false;cmRender()")
              : '<div style="display:flex;flex-direction:column;align-items:center;padding:64px 0;text-align:center">' +
                '<div style="font-size:48px;margin-bottom:16px">­¤ō░</div>' +
                '<div style="font-size:15px;font-weight:700;color:' + th.text + ';margin-bottom:6px">No News Available</div>' +
                '<div style="font-size:13px;color:' + th.muted + '">Check back later</div>' +
              '</div>') +

        '<div style="height:24px"></div>' +
      '</div>' +

      c.navBar(th, 3) +
    '</div>';
  }

  function sMe(th) {
    return '<div style="height:100%;display:flex;flex-direction:column;background:' + th.bg + ';font-family:' + T.sans + '">' +
      header(th, 'Me') +

      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">' +
        '<div style="width:72px;height:72px;border-radius:50%;background:' + th.card + ';border:1.5px solid ' + th.border + ';display:flex;align-items:center;justify-content:center;margin-bottom:20px">' +
          '<span style="font-size:28px">­¤źŖ</span>' +
        '</div>' +
        '<div style="font-size:18px;font-weight:800;color:' + th.text + ';margin-bottom:8px">Cutman</div>' +
        '<div style="font-size:13px;color:' + th.muted + ';line-height:1.6;margin-bottom:32px">One app. Every promotion.<br>All the fights.</div>' +

        /* Theme toggle */
        '<div style="width:100%;max-width:280px;background:' + th.card + ';border-radius:' + R.lg + ';padding:16px;margin-bottom:12px;border:1px solid ' + th.border + '">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<span style="font-size:13px;font-weight:600;color:' + th.sub + '">Dark Mode</span>' +
            '<div onclick="cmToggleTheme()" style="width:44px;height:26px;border-radius:' + R.pill + ';background:' + (cmState.dark ? th.primary : th.chip) + ';cursor:pointer;position:relative;transition:background 0.2s">' +
              '<div style="position:absolute;top:3px;left:' + (cmState.dark ? '21px' : '3px') + ';width:20px;height:20px;border-radius:50%;background:#FFF;transition:left 0.2s"></div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        /* Refresh data */
        '<div onclick="cmState._eventsLoaded=false;cmState._eventsLoading=false;cmState._eventsError=false;cmState._newsLoaded=false;cmState._newsLoading=false;cmState._newsError=false;cmGo(\'home\')" ' +
          'style="width:100%;max-width:280px;background:' + th.card + ';border-radius:' + R.lg + ';padding:16px;border:1px solid ' + th.border + ';cursor:pointer">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<span style="font-size:13px;font-weight:600;color:' + th.sub + '">Refresh All Data</span>' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>' +
          '</div>' +
        '</div>' +

      '</div>' +

      c.navBar(th, 4) +
    '</div>';
  }

  /* ŌöĆŌöĆŌöĆ MICRO HELPERS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */

  function statBar(th, label, val, total, color) {
    var pct = total > 0 ? Math.round(val / total * 100) : 0;
    return '<div style="margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:5px">' +
        '<span style="font-size:12px;font-weight:600;color:' + th.sub + '">' + label + '</span>' +
        '<span style="font-size:12px;font-weight:700;color:' + th.text + '">' + val + ' <span style="font-weight:400;color:' + th.muted + ';font-size:10px">(' + pct + '%)</span></span>' +
      '</div>' +
      '<div style="height:6px;background:' + th.card2 + ';border-radius:' + R.pill + ';overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:' + R.pill + ';transition:width 0.4s ease"></div>' +
      '</div>' +
    '</div>';
  }

  function bioRow(th, label, val) {
    if (!val) return '';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid ' + th.border + '">' +
      '<span style="font-size:13px;color:' + th.muted + '">' + label + '</span>' +
      '<span style="font-size:13px;font-weight:600;color:' + th.text + '">' + escHtml(String(val)) + '</span>' +
    '</div>';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/'/g,"\\'");
  }
  function tryParse(s) {
    try { return JSON.parse(s); } catch(e) { return null; }
  }

  /* ŌöĆŌöĆŌöĆ WIRE UP ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  CM.nav(
    { home: sHome, cards: sCards, fightCard: sFightCard, fighters: sFighters, fighter: sFighter, news: sNews, me: sMe },
    'home',
    'app',
    { state: { homeFilter: 'All', searchQuery: '', fighterTab: 'record' } }
  );

  /* ŌöĆŌöĆŌöĆ CSS ANIMATION ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  var style = document.createElement('style');
  style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(style);

  /* ŌöĆŌöĆŌöĆ SEARCH INPUT FOCUS FIX ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'fighter-search') {
      setTimeout(function() { e.target.focus(); }, 50);
    }
  });

})();
</script>
</body>
</html>

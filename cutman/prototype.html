<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cutman — Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0A0A0A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 370px;
    margin-bottom: 20px;
  }
  .back-to-case {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.15s;
  }
  .back-to-case:hover { color: #E8272A; }
  .top-title {
    font-size: 11px;
    font-weight: 700;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Phone frame */
  .phone-outer { position: relative; filter: drop-shadow(0 32px 64px rgba(0,0,0,0.7)); }
  .side-l { position:absolute;left:-4px;top:108px;width:4px;height:32px;background:#1A1A1A;border-radius:4px 0 0 4px;box-shadow:0 46px 0 #1A1A1A; }
  .side-r { position:absolute;right:-4px;top:130px;width:4px;height:64px;background:#1A1A1A;border-radius:0 4px 4px 0; }
  .phone-body { width:370px;height:760px;background:#0D0D0D;border-radius:54px;padding:12px;border:1px solid #2A2A2A;box-shadow:inset 0 1px 1px rgba(255,255,255,0.06),inset 0 -1px 0 rgba(0,0,0,0.5); }
  #phone-screen { width:100%;height:100%;border-radius:44px;overflow:hidden;position:relative; }

  /* Controls */
  .controls { text-align:center; margin-top:24px; width:370px; }
  #screen-label { font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px; }
  .hint { font-size:11px;color:#383838;margin-bottom:14px; }
  #screen-dots { display:flex;gap:7px;align-items:center;justify-content:center;margin-bottom:16px; }
  #screen-dots .dot { width:7px;height:7px;border-radius:50%;background:#252525;transition:all 0.2s; }
  #screen-dots .dot.on { width:22px;border-radius:4px;background:#E8272A; }
  .ctrl-row { display:flex;gap:10px;justify-content:center;align-items:center; }
  .theme-btn { background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);color:#666;font-size:12px;font-weight:600;padding:8px 20px;border-radius:100px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:border-color 0.15s,color 0.15s; }
  .theme-btn:hover { border-color:rgba(255,255,255,0.22);color:#999; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-to-case">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Case Study
  </a>
  <div class="top-title">Cutman Prototype</div>
  <div style="width:80px"></div>
</div>

<div class="phone-outer">
  <div class="side-l"></div>
  <div class="side-r"></div>
  <div class="phone-body">
    <div id="phone-screen"></div>
  </div>
</div>

<div class="controls">
  <div id="screen-label">Home</div>
  <div class="hint">Tap hero card or event cards to navigate · Tap fighters to see profiles</div>
  <div id="screen-dots"></div>
  <div class="ctrl-row">
    <button class="theme-btn" id="theme-btn" onclick="cmToggleTheme()">☀ Light</button>
  </div>
</div>

<script src="cutman-design-system.js"></script>
<script>
(function () {

  /* ═══════════════════════════════════════════════════════════

    { a: 'Leon Edwards',    aRank: 'Champion',  aGym: 'BCSA',              aOdds: -280, b: 'Shavkat Rakhimov',    bRank: '#3 Contender', bGym: 'Tiger Muay Thai',     bOdds: +225, weightClass: 'Welterweight',       rounds: 5, title: true },
    { a: 'Alex Pereira',    aRank: '#1',        aGym: 'Glory MMA',         aOdds: -400, b: 'Khalil Rountree Jr.', bRank: '#4',           bGym: 'Xtreme Couture',      bOdds: +310, weightClass: 'Light Heavyweight',  rounds: 3 },
    { a: 'Sean Strickland', aRank: '#2',        aGym: 'Xtreme Couture',    aOdds: -150, b: 'Paulo Costa',         bRank: '#5',           bGym: 'Team Luta Livre',     bOdds: +125, weightClass: 'Middleweight',       rounds: 3 },
    { a: 'Val. Shevchenko', aRank: '#1',        aGym: 'Tiger Muay Thai',   aOdds: +150, b: 'Alexa Grasso',        bRank: 'Champion',     bGym: 'Science of Fighting', bOdds: -180, weightClass: "Women's Flyweight",  rounds: 3 }

    { a: 'Brian Ortega',      aRank: '#3',          aGym: 'Gracie Hermosa',   aOdds: +135, b: 'Yair Rodriguez',      bRank: '#2',           bGym: 'Entram Gym',     bOdds: -165, weightClass: 'Featherweight', rounds: 3 },
    { a: 'Mateusz Gamrot',    aRank: '#6',          aGym: 'AKA Thailand',     aOdds: +165, b: 'Arman Tsarukyan',     bRank: '#4',           bGym: 'AKA Thailand',   bOdds: -200, weightClass: 'Lightweight',   rounds: 3 },
    { a: 'Cody Garbrandt',    aRank: 'NR',          aGym: 'Team Alpha Male',  aOdds: +200, b: 'Deiveson Figueiredo', bRank: 'Former Champ', bGym: 'Fight Ready',    bOdds: -250, weightClass: 'Flyweight',     rounds: 3 }

  var RECORD = [

    { result: 'W', opponent: 'Ciryl Gane',           method: 'SUB R1', event: 'UFC 285', date: 'Mar 2023' },
    { result: 'W', opponent: 'Dominick Reyes',       method: 'DEC',    event: 'UFC 247', date: 'Feb 2020' },
    { result: 'W', opponent: 'Thiago Santos',        method: 'DEC',    event: 'UFC 239', date: 'Jul 2019' },
    { result: 'W', opponent: 'Anthony Smith',        method: 'TKO R5', event: 'UFC 235', date: 'Mar 2019' },
    { result: 'W', opponent: 'Alex Gustafsson',      method: 'TKO R3', event: 'UFC 232', date: 'Dec 2018' },
    { result: 'L', opponent: 'Matt Hamill',          method: 'DQ R1',  event: 'UFC 121', date: 'Dec 2009' }
  ];

  var CORNER = {

    crew: [
      { name: 'Mike Winkeljohn', role: 'Striking Coach' },
      { name: 'Brandon Gibson',  role: 'Assistant Coach' },
      { name: 'Ryan Hall',       role: 'Grappling Specialist' }
    ],
    connections: [
      { name: 'Carlos Condit',  weightClass: 'Welterweight' },
      { name: 'Holly Holm',     weightClass: "W. Bantamweight" },
      { name: 'Max Holloway',   weightClass: 'Featherweight' },
      { name: 'Donald Cerrone', weightClass: 'Lightweight' }

  };

  var UPCOMING = {
    opponent: 'Stipe Miocic II', event: 'UFC 315', date: 'May 31, 2026', venue: 'MSG', network: 'ESPN+ PPV'
  };

  /* ═══════════════════════════════════════════════════════════
     SCREENS
  ═══════════════════════════════════════════════════════════ */

  function sHome(th) {
    var filter = cmState.homeFilter || 'All';
    var chips = ['All', 'UFC', 'Boxing', 'PFL', 'ONE', 'Bellator'];

    return '<div style="height:100%;display:flex;flex-direction:column;position:relative;font-family:' + T.sans + '">' +
      c.notch() + c.statusBar(th) +

      '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px ' + S.xl + ' 10px;flex-shrink:0">' +
        '<div>' +
          '<div style="font-size:18px;font-weight:800;color:' + th.text + ';letter-spacing:-0.02em;line-height:1">CUTMAN <span style="color:' + th.primary + '">🥊</span></div>' +
          '<div style="font-size:9px;font-weight:600;color:' + th.muted + ';letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">All Combat Sports</div>' +
        '</div>' +
        '<div style="position:relative;cursor:pointer;padding:4px">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="1.8" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>' +
          '<div style="position:absolute;top:3px;right:3px;width:7px;height:7px;background:' + th.primary + ';border-radius:50%;border:1.5px solid ' + th.bg + '"></div>' +
        '</div>' +
      '</div>' +

      '<div style="flex:1;overflow-y:auto;padding-bottom:80px;scrollbar-width:none">' +

        /* Hero */
        '<div onclick="cmGo(\'fightCard\')" style="margin:4px ' + S.xl + ' ' + S.section + ';border-radius:' + R.xl + ';overflow:hidden;cursor:pointer;' +
          'background-color:#1A0000;' +
          'background-image:linear-gradient(145deg,rgba(40,0,0,0.8) 0%,rgba(10,0,0,0.65) 40%,rgba(0,0,0,0.88) 100%),url(stipe%20jones.webp);' +
          'background-size:100% 100%,cover;background-position:center,center top;' +
          'position:relative;height:196px;' +
          'border:1px solid rgba(232,39,42,0.22);box-shadow:0 8px 32px rgba(232,39,42,0.15)">' +

          '<div style="position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(232,39,42,0.15);filter:blur(40px);pointer-events:none"></div>' +
          '<div style="position:absolute;inset:0;padding:16px 18px;display:flex;flex-direction:column;justify-content:space-between">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
              '<div style="display:flex;align-items:center;gap:8px">' +
                c.promoBadge(NEXT_EVENT.promo) +
                '<span style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.5)">' + NEXT_EVENT.date + '</span>' +
              '</div>' +
              '<div style="background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.12);border-radius:' + R.pill + ';padding:3px 10px;font-size:10px;color:rgba(255,255,255,0.65);font-weight:600">' + NEXT_EVENT.daysAway + 'd away</div>' +
            '</div>' +
            '<div>' +

              '<div style="display:flex;align-items:center;justify-content:space-between">' +
                '<div style="display:flex;align-items:center;gap:5px">' +

                '</div>' +

        /* Filter chips */

        '</div>' +

        /* This Week */
        c.sectionHeader(th, 'This Week', 'See all', 'void(0)') +
        '<div style="display:flex;gap:10px;overflow-x:auto;padding:0 ' + S.xl + ';margin-bottom:' + S.section + ';scrollbar-width:none">' +

            return '<div onclick="cmGo(\'fightCard\')" style="flex-shrink:0;width:148px;cursor:pointer">' +
              '<div style="height:110px;border-radius:' + R.lg + ';' +

                  ? 'background-color:#000;background-image:linear-gradient(to bottom,rgba(0,0,0,0.45) 0%,rgba(0,0,0,0.15) 40%,rgba(0,0,0,0.85) 100%),url(' + ev.img + ');background-size:100% 100%,cover;background-position:center,center;'

                '<span style="font-size:9px;color:' + th.muted + ';opacity:0.7">' + item.time + ' ago</span>' +

              '<div style="flex:1;font-size:12px;font-weight:' + (i < 2 ? '600' : '500') + ';color:' + (i < 2 ? th.text : th.sub) + ';line-height:1.45">' + item.headline + '</div>' +

      '</div>' +
      c.navBar(th, 0) +
    '</div>';
  }

  function sFightCard(th) {
    var showPrelims = cmState.showPrelims !== false;

    return '<div style="height:100%;display:flex;flex-direction:column;position:relative;font-family:' + T.sans + '">' +
      c.notch() + c.statusBar(th) +

      '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px ' + S.xl + ' 8px;flex-shrink:0">' +
        c.backBtn(th, '', 'cmGo(\'home\')') +
        '<div style="font-size:13px;font-weight:700;color:' + th.text + '">' + EVENT.name + '</div>' +
        c.promoBadge(EVENT.promo) +
      '</div>' +

      '<div style="flex:1;overflow-y:auto;padding-bottom:80px;scrollbar-width:none">' +

        '<div style="margin:0 ' + S.xl + ' 14px;border-radius:' + R.xl + ';overflow:hidden;' +
          'background-color:#1A0000;' +
          'background-image:linear-gradient(145deg,rgba(40,0,0,0.78) 0%,rgba(10,0,0,0.62) 45%,rgba(0,0,0,0.92) 100%),url(stipe%20jones.webp);' +
          'background-size:100% 100%,cover;background-position:center,center top;' +
          'border:1px solid rgba(232,39,42,0.25);padding:16px">' +
          '<div style="font-size:24px;font-weight:900;color:#FFF;letter-spacing:-0.02em;margin-bottom:4px">' + EVENT.name + '</div>' +
          '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:12px">' + EVENT.date + '</div>' +
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
            '<span style="font-size:11px;color:rgba(255,255,255,0.4)">' + EVENT.venue + ' · ' + EVENT.city + '</span>' +
          '</div>' +
          '<div style="font-size:10px;color:rgba(255,255,255,0.35)">' + EVENT.time + '</div>' +
        '</div>' +

        '<div style="padding:10px ' + S.xl + ';margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid ' + th.border + '">' +
          '<div style="display:flex;align-items:center;gap:8px">' +
            '<span style="font-size:9px;font-weight:700;color:' + th.muted + ';letter-spacing:0.1em;text-transform:uppercase">WATCH</span>' +
            '<span style="font-size:13px;font-weight:800;color:' + th.text + '">' + EVENT.network + '</span>' +
          '</div>' +
          '<span style="font-size:12px;font-weight:600;color:' + th.sub + '">' + EVENT.ppvPrice + '</span>' +
        '</div>' +

        '<div style="display:flex;align-items:center;gap:10px;padding:0 ' + S.xl + ';margin-bottom:4px">' +
          '<div style="flex:1;height:1px;background:' + th.border + '"></div>' +
          '<span style="font-size:10px;font-weight:800;color:' + th.muted + ';letter-spacing:0.14em">MAIN CARD</span>' +
          '<div style="flex:1;height:1px;background:' + th.border + '"></div>' +
        '</div>' +

        MAIN_CARD.map(function (f) { return c.fightRow(th, f); }).join('') +

        '<div onclick="cmToggleState(\'showPrelims\')" style="display:flex;align-items:center;gap:10px;padding:14px ' + S.xl + ';cursor:pointer">' +
          '<div style="flex:1;height:1px;background:' + th.border + '"></div>' +
          '<span style="font-size:10px;font-weight:800;color:' + th.muted + ';letter-spacing:0.14em">PRELIMS</span>' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2.5" stroke-linecap="round">' +
            '<path d="' + (showPrelims ? 'M18 15l-6-6-6 6' : 'M6 9l6 6 6-6') + '"/>' +
          '</svg>' +
          '<div style="flex:1;height:1px;background:' + th.border + '"></div>' +
        '</div>' +

        (showPrelims ? PRELIMS.map(function (f) { return c.fightRow(th, f); }).join('') : '') +

        '<div style="height:10px"></div>' +

      '</div>' +
      c.navBar(th, 1) +
    '</div>';
  }

  function sFighter(th) {
    var activeTab = cmState.fighterTab || 'record';

    return '<div style="height:100%;display:flex;flex-direction:column;position:relative;font-family:' + T.sans + '">' +
      c.notch() + c.statusBar(th) +

      '<div style="padding:4px ' + S.xl + ' 0">' + c.backBtn(th) + '</div>' +

      '<div style="flex:1;overflow-y:auto;padding-bottom:10px;scrollbar-width:none">' +

        '<div style="margin:8px ' + S.xl + ' 14px;border-radius:' + R.xl + ';overflow:hidden;' +
          'background-color:#1A0000;' +
          'background-image:linear-gradient(160deg,rgba(30,0,0,0.6) 0%,rgba(5,0,0,0.72) 55%,rgba(0,0,0,0.96) 100%),url(jon.jpg);' +
          'background-size:100% 100%,cover;background-position:center,center;' +
          'border:1px solid rgba(232,39,42,0.25);position:relative;padding:20px">' +

          '<div style="position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:rgba(232,39,42,0.15);filter:blur(35px);pointer-events:none"></div>' +

          '<div style="display:flex;align-items:center;gap:7px;margin-bottom:14px">' +
            c.promoBadge('UFC') +
            '<span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.08em;text-transform:uppercase">' + FIGHTER.weightClass + '</span>' +
          '</div>' +

          '<div style="font-size:32px;font-weight:900;color:#FFFFFF;line-height:1;letter-spacing:-0.02em;margin-bottom:2px">' + FIGHTER.name + '</div>' +
          '<div style="font-size:14px;color:rgba(255,255,255,0.45);font-style:italic;margin-bottom:12px">' + FIGHTER.nickname + '</div>' +

          '<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(212,168,83,0.15);border:1px solid rgba(212,168,83,0.4);border-radius:' + R.pill + ';padding:4px 12px;margin-bottom:16px">' +
            '<span style="font-size:12px">🏆</span>' +
            '<span style="font-size:10px;font-weight:700;color:#D4A853">' + FIGHTER.status + '</span>' +
          '</div>' +

          '<div style="display:flex;gap:20px;margin-bottom:16px">' +
            '<div>' +
              '<div style="font-size:28px;font-weight:900;color:#FFFFFF;line-height:1">' + FIGHTER.record + '</div>' +
              '<div style="font-size:9px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:0.08em;margin-top:2px">RECORD</div>' +
            '</div>' +
            '<div style="display:flex;gap:14px;align-items:flex-end">' +
              [['KO/TKO', FIGHTER.wins.ko, '#E8272A'], ['SUB', FIGHTER.wins.sub, '#D4A853'], ['DEC', FIGHTER.wins.dec, '#22C55E']].map(function (w) {
                return '<div style="text-align:center">' +
                  '<div style="font-size:18px;font-weight:800;color:' + w[2] + '">' + w[1] + '</div>' +
                  '<div style="font-size:8px;color:rgba(255,255,255,0.35);font-weight:600">' + w[0] + '</div>' +
                '</div>';
              }).join('') +
            '</div>' +
          '</div>' +

          '<div style="display:flex;gap:0;background:rgba(0,0,0,0.25);border-radius:' + R.md + ';overflow:hidden">' +
            [['Age', FIGHTER.age], ['Height', FIGHTER.height], ['Weight', FIGHTER.weight], ['Reach', FIGHTER.reach]].map(function (s, i) {
              return '<div style="flex:1;text-align:center;padding:9px 4px;' + (i > 0 ? 'border-left:1px solid rgba(255,255,255,0.08)' : '') + '">' +
                '<div style="font-size:13px;font-weight:700;color:#FFF">' + s[1] + '</div>' +
                '<div style="font-size:8px;color:rgba(255,255,255,0.35);margin-top:2px;font-weight:600;letter-spacing:0.05em">' + s[0].toUpperCase() + '</div>' +
              '</div>';
            }).join('') +
          '</div>' +

        '</div>' +

        '<div style="margin:0 ' + S.xl + ' 14px;border-radius:' + R.md + ';padding:12px 14px;background:' + th.card + ';border:1px solid ' + th.border + '">' +
          '<div style="font-size:9px;font-weight:700;color:' + th.muted + ';letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">NEXT FIGHT</div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between">' +
            '<div>' +
              '<div style="font-size:14px;font-weight:800;color:' + th.text + '">vs. ' + UPCOMING.opponent + '</div>' +
              '<div style="font-size:11px;color:' + th.muted + ';margin-top:2px">' + UPCOMING.event + ' · ' + UPCOMING.date + '</div>' +
              '<div style="font-size:10px;color:' + th.muted + ';margin-top:1px">' + UPCOMING.venue + ' · ' + UPCOMING.network + '</div>' +
            '</div>' +
            '<div onclick="cmGo(\'fightCard\')" style="background:' + th.primary + ';color:white;padding:7px 12px;border-radius:' + R.md + ';font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0">Card →</div>' +
          '</div>' +
        '</div>' +

        '<div style="display:flex;padding:0 ' + S.xl + ';margin-bottom:0;gap:0;border-bottom:1px solid ' + th.border + ';position:sticky;top:0;z-index:10;background:' + th.bg + '">' +
          [['record', 'Record'], ['corner', 'Corner'], ['bio', 'Bio']].map(function (tab) {
            var active = activeTab === tab[0];
            return '<div onclick="cmSetState(\'fighterTab\',\'' + tab[0] + '\')" style="flex:1;text-align:center;padding:10px 0;cursor:pointer;' +
              'font-size:12px;font-weight:' + (active ? T.wt.semi : T.wt.med) + ';' +
              'color:' + (active ? th.text : th.muted) + ';' +
              'border-bottom:2px solid ' + (active ? th.text : 'transparent') + ';' +
              'margin-bottom:-1px">' + tab[1] + '</div>';
          }).join('') +
        '</div>' +

        (activeTab === 'record'
          ? '<div>' + RECORD.map(function (f) { return CM.c.resultRow(th, f); }).join('') + '</div>'

          : activeTab === 'corner'
          ? '<div style="padding:14px ' + S.xl + '">' +
              '<div style="font-size:9px;font-weight:700;color:' + th.muted + ';letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px">In The Corner</div>' +
              '<div style="background:' + th.card + ';border:1px solid ' + th.border + ';border-radius:' + R.lg + ';padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px">' +
                '<div style="width:36px;height:36px;border-radius:50%;background:rgba(232,39,42,0.15);border:1.5px solid ' + th.primary + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
                  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + th.primary + '" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' +
                '</div>' +
                '<div>' +
                  '<div style="font-size:13px;font-weight:700;color:' + th.text + '">' + CORNER.headCoach.name + '</div>' +
                  '<div style="font-size:10px;color:' + th.primary + ';font-weight:600;margin-top:1px">' + CORNER.headCoach.role + '</div>' +
                  '<div style="font-size:10px;color:' + th.muted + ';margin-top:1px">' + CORNER.headCoach.gym + '</div>' +
                '</div>' +
              '</div>' +
              CORNER.crew.map(function (p) {
                return '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid ' + th.border + '">' +
                  '<span style="font-size:12px;font-weight:600;color:' + th.text + '">' + p.name + '</span>' +
                  '<span style="font-size:10px;color:' + th.muted + '">' + p.role + '</span>' +
                '</div>';
              }).join('') +
              '<div style="font-size:9px;font-weight:700;color:' + th.muted + ';letter-spacing:0.12em;text-transform:uppercase;margin-top:18px;margin-bottom:10px">Corner Connections</div>' +
              '<div style="font-size:10px;color:' + th.muted + ';margin-bottom:12px">Other fighters at ' + CORNER.headCoach.gym + '</div>' +
              '<div style="display:flex;flex-wrap:wrap;gap:8px">' +
                CORNER.connections.map(function (f) {
                  return '<div style="padding:6px 12px;border-radius:' + R.pill + ';background:' + th.card + ';border:1px solid ' + th.border + '">' +
                    '<div style="font-size:11px;font-weight:700;color:' + th.text + '">' + f.name + '</div>' +
                    '<div style="font-size:9px;color:' + th.muted + ';margin-top:1px">' + f.weightClass + '</div>' +
                  '</div>';
                }).join('') +
              '</div>' +
            '</div>'

          : '<div style="padding:16px ' + S.xl + '">' +
              [
                ['Nickname', FIGHTER.nickname],
                ['Nationality', FIGHTER.nationality],
                ['Gym', FIGHTER.gym],
                ['Stance', FIGHTER.stance],
                ['Weight Class', FIGHTER.weightClass]
              ].map(function (row) {
                return '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid ' + th.border + '">' +
                  '<span style="font-size:12px;color:' + th.muted + '">' + row[0] + '</span>' +
                  '<span style="font-size:12px;font-weight:600;color:' + th.text + '">' + row[1] + '</span>' +
                '</div>';
              }).join('') +
            '</div>'
        ) +

      '</div>' +
    '</div>';
  }

  /* ═══════════════════════════════════════════════════════════
     WIRE UP
  ═══════════════════════════════════════════════════════════ */
  CM.nav(
    { home: sHome, fightCard: sFightCard, fighter: sFighter },
    'home',
    'phone-screen',
    {
      state: { homeFilter: 'All', showPrelims: true, fighterTab: 'record' },
      onRender: function (state, theme) {
        var names = { home: 'Home', fightCard: 'UFC 315 — Fight Card', fighter: 'Jon Jones — Fighter Profile' };
        var hints = { home: 'Tap the hero card or week events to navigate', fightCard: 'Tap any fighter row to see their profile · Toggle prelims', fighter: 'Tap tabs to switch sections · Tap Card → to go back' };
        var lbl = document.getElementById('screen-label');
        if (lbl) lbl.textContent = names[state.cur] || state.cur;
        var hnt = document.querySelector('.hint');
        if (hnt) hnt.textContent = hints[state.cur] || '';
        var dots = document.getElementById('screen-dots');
        if (dots) {
          var list = ['home', 'fightCard', 'fighter'];
          dots.innerHTML = list.map(function (s) { return '<div class="dot' + (s === state.cur ? ' on' : '') + '"></div>'; }).join('');
        }
        var btn = document.getElementById('theme-btn');
        if (btn) btn.textContent = state.dark ? '☀ Light' : '☾ Dark';
      }
    }
  );

  /* fight row clicks → fighter profile */
  document.getElementById('phone-screen').addEventListener('click', function (e) {
    var row = e.target.closest('[data-goto-fighter]');
    if (row) cmGo('fighter');
  });
})();
</script>
</body>
</html>

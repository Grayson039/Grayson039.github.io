<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1200px;height:630px;overflow:hidden;background:#0A0A0A;font-family:Georgia,'Times New Roman',serif;}
  .bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 85% 10%,#0c3d38 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 10% 95%,#2a1200 0%,transparent 70%),#0A0A0A;}
  .wrap{position:relative;width:1200px;height:630px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
  .logo-wrap{width:340px;height:146px;overflow:hidden;margin-bottom:28px;}
  .logo{width:340px;display:block;image-rendering:-webkit-optimize-contrast;}
  .divider{width:600px;height:1px;background:rgba(255,255,255,0.07);margin-bottom:36px;}
  .headline{font-size:64px;font-weight:900;color:#fff;text-align:center;line-height:1.1;margin-bottom:10px;}
  .headline span{color:#3EEDE7;display:block;}
  .sub{font-family:Arial,Helvetica,sans-serif;font-size:16px;color:rgba(255,255,255,0.38);text-align:center;letter-spacing:1px;margin-bottom:36px;}
  .divider2{width:600px;height:1px;background:rgba(255,255,255,0.07);margin-bottom:30px;}
  .stats{display:flex;align-items:center;gap:0;}
  .stat{text-align:center;padding:0 48px;}
  .stat-val{font-family:Georgia,serif;font-size:38px;font-weight:900;color:#3EEDE7;line-height:1;}
  .stat-lbl{font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-top:4px;}
  .sep{width:1px;height:44px;background:rgba(255,255,255,0.08);}
  .diamond{position:absolute;bottom:24px;right:28px;width:10px;height:10px;background:#C9A84C;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);opacity:0.5;}
  .url{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-family:Arial,sans-serif;font-size:12px;color:rgba(255,255,255,0.18);letter-spacing:1px;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo-wrap"><img class="logo" src="logo.svg" alt="SceneOne"></div>
  <div class="divider"></div>
  <div class="headline">Studio-grade notes.<span>Democratizing Hollywood.</span></div>
  <div class="sub">Structure &middot; Conflict &middot; Dialogue &middot; Pacing &middot; Visual Storytelling</div>
  <div class="divider2"></div>
  <div class="stats">
    <div class="stat"><div class="stat-val">72</div><div class="stat-lbl">SAMPLE SCORE</div></div>
    <div class="sep"></div>
    <div class="stat"><div class="stat-val">5</div><div class="stat-lbl">CRAFT DIMENSIONS</div></div>
    <div class="sep"></div>
    <div class="stat"><div class="stat-val">&lt;5min</div><div class="stat-lbl">TURNAROUND</div></div>
  </div>
</div>
<div class="diamond"></div>
<div class="url">sceneone.net</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneOne — Upload Your Script</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F0F0F; --card: #1A1A1A; --navy: #053154;
    --gold: #C9A84C; --cyan: #3EEDE7; --amber: #E8923A;
    --green: #4CAF7D; --body: #E5E5E5; --muted: #BBBBBB;
    --white: #FFFFFF; --graphite: #2A2A2A;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--body);
    font-family: 'Inter', sans-serif; min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* FILM GRAIN */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* AMBIENT GLOW */
  .glow-orb {
    position: fixed; top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(62,237,231,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 60px; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(15,15,15,0.96); border-bottom: 1px solid rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700;
    color: var(--white); letter-spacing: -0.01em; text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo span { color: var(--cyan); }
  .nav-back {
    font-size: 12px; font-weight: 500; color: var(--muted);
    text-decoration: none; display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--white); }
  .nav-back svg { width: 14px; height: 14px; }

  /* MAIN */
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 80px 24px 40px; position: relative; z-index: 1;
  }

  .upload-container {
    width: 100%; max-width: 560px;
    display: flex; flex-direction: column; align-items: center; gap: 32px;
  }

  /* HEADER */
  .upload-header { text-align: center; }
  .upload-eyebrow {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--cyan); font-weight: 500; margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .upload-eyebrow::before, .upload-eyebrow::after {
    content: ''; flex: 1; max-width: 40px; height: 1px;
    background: rgba(62,237,231,0.25);
  }
  .upload-title {
    font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 40px);
    font-weight: 700; font-style: italic; color: var(--white);
    line-height: 1.15; margin-bottom: 10px;
  }
  .upload-subtitle {
    font-size: 14px; font-weight: 300; color: var(--muted);
    line-height: 1.6;
  }

  /* DROP ZONE */
  .drop-zone {
    width: 100%; border: 1.5px dashed rgba(62,237,231,0.3);
    border-radius: 12px; padding: 52px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    cursor: pointer; position: relative; overflow: hidden;
    background: rgba(62,237,231,0.02);
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--cyan);
    background: rgba(62,237,231,0.04);
    box-shadow: 0 0 40px rgba(62,237,231,0.08), inset 0 0 40px rgba(62,237,231,0.03);
  }
  .drop-zone.drag-over .drop-icon { transform: scale(1.1); color: var(--cyan); }
  .drop-zone.has-file { border-color: var(--green); background: rgba(76,175,125,0.04); box-shadow: 0 0 30px rgba(76,175,125,0.08); }

  /* Corner accents */
  .drop-zone::before, .drop-zone::after {
    content: ''; position: absolute; width: 20px; height: 20px; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }
  .drop-zone::before { top: 12px; left: 12px; border-top: 1.5px solid var(--cyan); border-left: 1.5px solid var(--cyan); }
  .drop-zone:hover::after, .drop-zone.drag-over::after { opacity: 1; }
  .drop-zone::after { bottom: 12px; right: 12px; border-bottom: 1.5px solid var(--cyan); border-right: 1.5px solid var(--cyan); }

  .drop-icon {
    width: 52px; height: 52px; color: rgba(62,237,231,0.45);
    transition: transform 0.25s, color 0.25s;
  }

  .drop-title {
    font-size: 16px; font-weight: 600; color: var(--white); text-align: center;
  }
  .drop-or {
    font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .btn-browse {
    font-size: 13px; font-weight: 500; color: var(--cyan);
    border: 1px solid rgba(62,237,231,0.25); padding: 8px 20px;
    border-radius: 6px; background: transparent; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-browse:hover { background: rgba(62,237,231,0.06); border-color: rgba(62,237,231,0.5); }

  .drop-formats {
    font-size: 11px; color: rgba(255,255,255,0.2);
    display: flex; gap: 12px; align-items: center;
  }
  .format-tag {
    font-family: 'Courier Prime', monospace; font-size: 10px;
    color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07); padding: 2px 8px;
    border-radius: 3px; letter-spacing: 0.06em;
  }

  /* FILE SELECTED STATE */
  .file-selected {
    display: none; align-items: center; gap: 14px;
    background: rgba(76,175,125,0.06); border: 1px solid rgba(76,175,125,0.2);
    border-radius: 8px; padding: 14px 18px; width: 100%;
  }
  .file-selected.visible { display: flex; }
  .file-icon { font-size: 28px; flex-shrink: 0; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-check { width: 20px; height: 20px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .file-check svg { width: 11px; height: 11px; color: #000; }
  .btn-remove { font-size: 11px; color: rgba(255,255,255,0.25); background: none; border: none; cursor: pointer; padding: 4px; font-family: inherit; transition: color 0.2s; }
  .btn-remove:hover { color: var(--amber); }

  /* CTA */
  .cta-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .btn-analyze {
    width: 100%; padding: 16px 24px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    color: #000; background: var(--cyan); border: none;
    border-radius: 8px; cursor: pointer; letter-spacing: 0.01em;
    transition: all 0.25s; position: relative; overflow: hidden;
    opacity: 0.35; pointer-events: none;
  }
  .btn-analyze.ready { opacity: 1; pointer-events: auto; }
  .btn-analyze.ready:hover { background: #5FF5F0; box-shadow: 0 4px 24px rgba(62,237,231,0.3); transform: translateY(-1px); }
  .btn-analyze.ready:active { transform: translateY(0); }

  .privacy-note {
    font-size: 11px; color: rgba(255,255,255,0.2); text-align: center;
    display: flex; align-items: center; gap: 6px;
  }
  .privacy-note svg { width: 12px; height: 12px; opacity: 0.5; flex-shrink: 0; }

  /* HIDDEN INPUT */
  #fileInput { display: none; }

  /* DEMO HINT */
  .demo-hint {
    font-size: 11px; color: rgba(62,237,231,0.4); text-align: center;
    font-style: italic; letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="glow-orb"></div>

<nav>
  <a href="landing.html" class="nav-logo">Scene<span>One</span></a>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Case Study
  </a>
</nav>

<main>
  <div class="upload-container">

    <div class="upload-header">
      <div class="upload-eyebrow">Step 1 of 3</div>
      <h1 class="upload-title">Upload your script.</h1>
      <p class="upload-subtitle">Drop it in. We'll read every page before you send it anywhere.</p>
    </div>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
      <div class="drop-title">Drop your script here</div>
      <div class="drop-or">or</div>
      <button class="btn-browse" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Browse files</button>
      <div class="drop-formats">
        <span class="format-tag">.PDF</span>
        <span class="format-tag">.FDX</span>
        <span class="format-tag">.FOUNTAIN</span>
      </div>
    </div>

    <div class="file-selected" id="fileSelected">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name" id="fileName">—</div>
        <div class="file-meta" id="fileMeta">—</div>
      </div>
      <div class="file-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <button class="btn-remove" id="btnRemove">✕</button>
    </div>

    <div class="cta-section">
      <button class="btn-analyze" id="btnAnalyze" onclick="window.location='processing.html'">
        Read My Script →
      </button>
      <div class="privacy-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Your script is never stored or shared. Analyzed in memory, deleted after.
      </div>
    </div>

    <div class="demo-hint" id="demoHint">Prototype: select any file to continue →</div>

  </div>
</main>

<input type="file" id="fileInput" accept=".pdf,.fdx,.fountain">

<script>
  var dropZone = document.getElementById('dropZone');
  var fileInput = document.getElementById('fileInput');
  var fileSelected = document.getElementById('fileSelected');
  var fileName = document.getElementById('fileName');
  var fileMeta = document.getElementById('fileMeta');
  var btnAnalyze = document.getElementById('btnAnalyze');
  var btnRemove = document.getElementById('btnRemove');
  var demoHint = document.getElementById('demoHint');

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function showFile(file) {
    dropZone.classList.add('has-file');
    fileSelected.classList.add('visible');
    fileName.textContent = file.name;
    fileMeta.textContent = formatSize(file.size) + ' · Ready to analyze';
    btnAnalyze.classList.add('ready');
    demoHint.style.display = 'none';
  }

  function clearFile() {
    dropZone.classList.remove('has-file');
    fileSelected.classList.remove('visible');
    fileName.textContent = '—';
    fileMeta.textContent = '—';
    btnAnalyze.classList.remove('ready');
    fileInput.value = '';
    demoHint.style.display = '';
  }

  fileInput.addEventListener('change', function() {
    if (fileInput.files.length) showFile(fileInput.files[0]);
  });

  btnRemove.addEventListener('click', function(e) {
    e.stopPropagation();
    clearFile();
  });

  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    var files = e.dataTransfer.files;
    if (files.length) showFile(files[0]);
  });
</script>
</body>
</html>
